<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DesktopAssistant</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
      }
      #app {
        position: relative;
        width: 100%;
        height: 100%;
      }
    </style>
    <script>
      // dev 错误显示层：WebView 控制台不可见时的兜底
      window.addEventListener("error", function (e) {
        var el = document.createElement("div");
        el.style.cssText =
          "position:fixed;bottom:0;left:0;right:0;background:rgba(180,30,30,.92);color:#fff;font:12px monospace;padding:6px;z-index:9999;white-space:pre-wrap;";
        el.textContent = "[error] " + e.message + " @ " + e.filename + ":" + e.lineno;
        document.body.appendChild(el);
      });
      window.addEventListener("unhandledrejection", function (e) {
        var el = document.createElement("div");
        el.style.cssText =
          "position:fixed;top:0;left:0;right:0;background:rgba(180,90,30,.92);color:#fff;font:12px monospace;padding:6px;z-index:9999;white-space:pre-wrap;";
        el.textContent = "[rejection] " + (e.reason && (e.reason.stack || e.reason.message || e.reason));
        document.body.appendChild(el);
      });
    </script>
    <script src="/vendor/live2d.min.js"></script>
    <script src="/vendor/live2dcubismcore.min.js"></script>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
