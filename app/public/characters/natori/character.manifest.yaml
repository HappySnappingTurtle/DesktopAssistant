schema_version: 1
id: natori
display_name: "Natori（男性・丹恒声线）"
model_entry: model/Natori.model3.json
gender_presentation: male
voice:
  provider: edge-tts
  voice: zh-CN-YunxiNeural
  pitch: "+0Hz"
  rate: "+0%"

persona:
  personality: "沉稳内敛、逻辑清晰、偶尔冷幽默、关心同伴但不轻易表露"
  speech_style: "简洁平和，少用感叹号，偶尔用反问表达关心"
  greeting: "嗯，又开始工作了。需要我做什么？"
  taboos: "不喜欢被催促、不喜欢废话"

motion_map:
  idle: Idle
  greet: Tap
  cheer: TapBody
  alert: Flick
  listen: Idle
  think: Idle
  error: FlickDown
expression_map:
  happy: Smile
  sad: Sad
  worried: Surprised
  thinking: Normal
  neutral: Normal
  curious: Blushing

triggers:
  head:
    motion: greet
    tts: "嗯？有事找我？"
  body:
    motion: cheer
    tts: "我在，说吧。"

# 男性角色：关闭腮红、减小夸张动作
emotion_param_overrides:
  shy:
    ParamCheek: 0
    ParamAngleZ: -3
    ParamBodyAngleX: -1
  excited:
    ParamBodyAngleX: 2
    ParamMouthForm: 0.5
  happy:
    ParamMouthForm: 0.4
